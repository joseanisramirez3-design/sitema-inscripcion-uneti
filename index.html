<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inscripción - UNETI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        form { margin-bottom: 20px; }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registro de Alumnos (CRUD)</h1>
        
        <form action="/registrar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre del Alumno" required>
            <button type="submit">Inscribir</button>
        </form>

        <h2>Lista de Inscritos (READ)</h2>
        <table>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
            </tr>
            {% for alumno in alumnos %}
            <tr>
                <td>{{ alumno['id'] }}</td>
                <td>{{ alumno['nombre'] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
